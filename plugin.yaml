name: brave-search
version: 0.1.5
description: Brave Search Pro provider and advanced Brave search tool for Hermes Agent
kind: backend
provides_tools:
  - brave_search
provides_web_providers:
  - brave-pro
requires_env:
  - name: BRAVE_SEARCH_API_KEY
    description: Brave Search API key for Brave-backed web_search and brave_search
    url: https://brave.com/search/api/
    secret: true
  - name: TAVILY_API_KEY
    description: Tavily API key for the recommended web_extract pairing
    url: https://app.tavily.com/
    secret: true
