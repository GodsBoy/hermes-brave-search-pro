name: CI

on:
  push:
    branches: [main]
  pull_request:

# Transitional safety net while GitHub migrates runners to Node.js 24.
# The actions below already target Node 24, so this can be dropped later.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          uv venv
          uv pip install -e '.[dev]'
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest
