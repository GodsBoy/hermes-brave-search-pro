<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Brave Search Pro for Hermes Agent</title>
  <desc id="desc">Infographic showing Hermes Agent using Brave Search Pro for discovery, a dedicated Brave Search tool for advanced search modes, and Tavily for extraction.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070A12"/>
      <stop offset="0.52" stop-color="#101827"/>
      <stop offset="1" stop-color="#251108"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8A00"/>
      <stop offset="1" stop-color="#FF3D00"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 0.45 0 0 0.35 0 0 0.1 0 0 0 0 0.65 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 800 58px Inter, ui-sans-serif, system-ui, sans-serif; fill: #fff; letter-spacing: -1.5px; }
      .subtitle { font: 500 25px Inter, ui-sans-serif, system-ui, sans-serif; fill: #C7D2FE; }
      .eyebrow { font: 800 15px Inter, ui-sans-serif, system-ui, sans-serif; fill: #FDBA74; letter-spacing: 3px; }
      .card-title { font: 800 28px Inter, ui-sans-serif, system-ui, sans-serif; fill: #fff; }
      .card-copy { font: 500 18px Inter, ui-sans-serif, system-ui, sans-serif; fill: #CBD5E1; }
      .tiny { font: 700 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: #94A3B8; letter-spacing: 1px; }
      .pill { font: 800 15px Inter, ui-sans-serif, system-ui, sans-serif; fill: #fff; }
      .code { font: 700 18px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #E2E8F0; }
      .muted { fill: #94A3B8; }
      .card { fill: rgba(15, 23, 42, 0.82); stroke: rgba(148, 163, 184, 0.28); stroke-width: 1.4; }
      .line { stroke: #64748B; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 8 12; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>
  <circle cx="1120" cy="120" r="260" fill="#FF5A1F" opacity="0.12"/>
  <circle cx="240" cy="700" r="270" fill="#2563EB" opacity="0.16"/>

  <text x="82" y="92" class="eyebrow">HERMES WEB SEARCH, UPGRADED</text>
  <text x="80" y="158" class="title">Brave Search Pro plugin</text>
  <text x="82" y="203" class="subtitle">Fast discovery, richer search modes, and Tavily extraction staying exactly where it belongs.</text>

  <rect x="78" y="258" width="312" height="210" rx="28" class="card"/>
  <circle cx="130" cy="318" r="30" fill="url(#blue)" filter="url(#glow)"/>
  <text x="178" y="311" class="tiny">DEFAULT TOOL</text>
  <text x="178" y="346" class="card-title">web_search</text>
  <text x="108" y="394" class="card-copy">Hermes keeps its normal</text>
  <text x="108" y="423" class="card-copy">tool contract. Brave powers</text>
  <text x="108" y="452" class="card-copy">the backend.</text>

  <rect x="544" y="238" width="312" height="250" rx="34" fill="rgba(255, 91, 31, 0.15)" stroke="rgba(251, 146, 60, 0.55)" stroke-width="2"/>
  <path d="M699 293 C754 293 792 330 792 383 C792 438 754 475 699 475 C644 475 607 438 607 383 C607 330 644 293 699 293Z" fill="url(#orange)" opacity="0.94" filter="url(#glow)"/>
  <path d="M663 360 L699 320 L735 360 L721 360 L721 427 L677 427 L677 360Z" fill="#fff" opacity="0.95"/>
  <text x="620" y="540" class="card-title">Brave Search Pro</text>
  <text x="598" y="574" class="card-copy">fresh index-backed discovery</text>

  <rect x="1010" y="258" width="312" height="210" rx="28" class="card"/>
  <circle cx="1062" cy="318" r="30" fill="#14B8A6" filter="url(#glow)"/>
  <text x="1110" y="311" class="tiny">EXTRACT STAYS</text>
  <text x="1110" y="346" class="card-title">Tavily</text>
  <text x="1040" y="394" class="card-copy">Page extraction remains</text>
  <text x="1040" y="423" class="card-copy">separate, clean, and</text>
  <text x="1040" y="452" class="card-copy">purpose-built.</text>

  <path d="M392 360 C456 360 482 360 542 360" class="line"/>
  <path d="M858 360 C922 360 948 360 1008 360" class="line"/>
  <polygon points="532,349 552,360 532,371" fill="#CBD5E1"/>
  <polygon points="998,349 1018,360 998,371" fill="#CBD5E1"/>

  <rect x="138" y="604" width="1124" height="118" rx="30" fill="rgba(2, 6, 23, 0.64)" stroke="rgba(148, 163, 184, 0.22)"/>
  <text x="182" y="652" class="code">web.search_backend: "brave-pro"</text>
  <text x="182" y="691" class="code">web.extract_backend: "tavily"</text>
  <rect x="760" y="628" width="115" height="35" rx="17.5" fill="rgba(255,255,255,0.11)"/>
  <text x="784" y="652" class="pill">web</text>
  <rect x="890" y="628" width="115" height="35" rx="17.5" fill="rgba(255,255,255,0.11)"/>
  <text x="914" y="652" class="pill">news</text>
  <rect x="1020" y="628" width="115" height="35" rx="17.5" fill="rgba(255,255,255,0.11)"/>
  <text x="1041" y="652" class="pill">images</text>
  <rect x="1150" y="628" width="82" height="35" rx="17.5" fill="rgba(255,255,255,0.11)"/>
  <text x="1171" y="652" class="pill">raw</text>
  <text x="760" y="696" class="card-copy">Extra modes live in the explicit brave_search tool.</text>
</svg>
